<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rohit Education</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f8fc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.login-box{
background:white;
padding:30px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
text-align:center;
color:#0d6efd;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}
button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">
<h2>Student Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
